name: Generate and Publish PDF

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpng-dev libcurl4-openssl-dev libssl-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c(
            "ggplot2",
            "tidyr",
            "dplyr",
            "gridExtra",
            "png",
            "httr",
            "jsonlite"
          ), repos="https://cloud.r-project.org")'

      - name: Run R script
        run: |
          Rscript Amphibien.R

      - name: Prepare GitHub Pages folder
        run: |
          mkdir -p docs
          # Move the PDF and rename safely
          mv *.pdf docs/Kroetenzaunauswertung.pdf
          # Ensure index.html exists
          if [ ! -f docs/index.html ]; then
            echo '<!DOCTYPE html><html><head><meta charset="utf-8"><title>Amphibien Ostviertel</title></head><body><h1>Amphibien Ostviertel Reports</h1><p><a href="Kroetenzaunauswertung.pdf" target="_blank">Open latest PDF</a></p></body></html>' > docs/index.html
          fi

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/Kroetenzaunauswertung.pdf docs/index.html
          git commit -m "Update PDF report"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
